<svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="960" height="540" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="700" letter-spacing="1">RESEARCH WORKFLOW</text>

  <!-- INPUT DATA -->
  <rect x="310" y="55" width="340" height="72" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="480" y="77" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">INPUT DATA</text>
  <text x="480" y="96" text-anchor="middle" fill="#8b949e" font-size="11">RGB + CIR aerial imagery (25 cm) · AHN4 LiDAR</text>
  <text x="480" y="114" text-anchor="middle" fill="#8b949e" font-size="11">Municipal tree inventory · Enschede</text>

  <!-- Arrow down + split -->
  <line x1="480" y1="127" x2="480" y2="148" stroke="#30363d" stroke-width="1.5"/>
  <line x1="200" y1="148" x2="760" y2="148" stroke="#30363d" stroke-width="1.5"/>
  <line x1="200" y1="148" x2="200" y2="168" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="760" y1="148" x2="760" y2="168" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ONE-STEP box -->
  <rect x="50" y="168" width="300" height="62" rx="8" fill="#161b22" stroke="#f78166" stroke-width="1.5"/>
  <text x="200" y="192" text-anchor="middle" fill="#f78166" font-size="12" font-weight="700">ONE-STEP APPROACH</text>
  <text x="200" y="210" text-anchor="middle" fill="#8b949e" font-size="11">YOLOv11s Object Detection</text>
  <text x="200" y="225" text-anchor="middle" fill="#8b949e" font-size="10">RGB · IRRG</text>

  <!-- TWO-STEP box -->
  <rect x="610" y="168" width="300" height="62" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="760" y="192" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">TWO-STEP APPROACH</text>
  <text x="760" y="210" text-anchor="middle" fill="#8b949e" font-size="11">Crown Delineation + Classification</text>
  <text x="760" y="225" text-anchor="middle" fill="#8b949e" font-size="10">RGB · IRRG</text>

  <!-- Arrow one-step down -->
  <line x1="200" y1="230" x2="200" y2="268" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow two-step down to sub-boxes -->
  <line x1="760" y1="230" x2="760" y2="255" stroke="#30363d" stroke-width="1.5"/>
  <line x1="655" y1="255" x2="865" y2="255" stroke="#30363d" stroke-width="1.5"/>
  <line x1="655" y1="255" x2="655" y2="268" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="865" y1="255" x2="865" y2="268" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Bounding box predictions -->
  <rect x="50" y="268" width="300" height="52" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="200" y="291" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Bounding box predictions</text>
  <text x="200" y="308" text-anchor="middle" fill="#8b949e" font-size="10">Class label + confidence score per crown</text>

  <!-- Crown Delineation -->
  <rect x="580" y="268" width="150" height="58" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="655" y="289" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Crown Delineation</text>
  <text x="655" y="306" text-anchor="middle" fill="#8b949e" font-size="10">PyCrown (LiDAR)</text>
  <text x="655" y="320" text-anchor="middle" fill="#8b949e" font-size="10">YOLOv11s-seg (image)</text>

  <!-- Feature Extraction -->
  <rect x="790" y="268" width="150" height="58" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="865" y="289" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Feature Extraction</text>
  <text x="865" y="306" text-anchor="middle" fill="#8b949e" font-size="10">RGB · NIR · NDVI</text>
  <text x="865" y="320" text-anchor="middle" fill="#8b949e" font-size="10">CHM · Crown area</text>

  <!-- Arrow between delineation and features -->
  <line x1="730" y1="297" x2="788" y2="297" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow from features+delineation down to RF -->
  <line x1="655" y1="326" x2="655" y2="352" stroke="#30363d" stroke-width="1.5"/>
  <line x1="865" y1="326" x2="865" y2="352" stroke="#30363d" stroke-width="1.5"/>
  <line x1="655" y1="352" x2="865" y2="352" stroke="#30363d" stroke-width="1.5"/>
  <line x1="760" y1="352" x2="760" y2="368" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Random Forest -->
  <rect x="610" y="368" width="300" height="66" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="760" y="390" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="700">Random Forest Classification</text>
  <text x="760" y="408" text-anchor="middle" fill="#8b949e" font-size="10">Binary: allergenic vs non-allergenic</text>
  <text x="760" y="423" text-anchor="middle" fill="#8b949e" font-size="10">Multi-class: 5 species (FC1 · FC2)</text>

  <!-- Arrows converging to output -->
  <line x1="200" y1="320" x2="200" y2="458" stroke="#30363d" stroke-width="1.5"/>
  <line x1="760" y1="434" x2="760" y2="458" stroke="#30363d" stroke-width="1.5"/>
  <line x1="200" y1="458" x2="760" y2="458" stroke="#30363d" stroke-width="1.5"/>
  <line x1="480" y1="458" x2="480" y2="472" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output box -->
  <rect x="200" y="472" width="560" height="46" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="480" y="493" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">Species Predictions + Spatial Analysis</text>
  <text x="480" y="509" text-anchor="middle" fill="#8b949e" font-size="10">LCZ analysis · Campus validation · GeoJSON export</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#30363d"/>
    </marker>
  </defs>

</svg>
