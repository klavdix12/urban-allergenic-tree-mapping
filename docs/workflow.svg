<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="960" height="560" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="700" letter-spacing="1">RESEARCH WORKFLOW</text>

  <!-- INPUT DATA -->
  <rect x="310" y="55" width="340" height="72" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="480" y="77" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">INPUT DATA</text>
  <text x="480" y="96" text-anchor="middle" fill="#8b949e" font-size="11">RGB + CIR aerial imagery (25 cm) · AHN4 LiDAR</text>
  <text x="480" y="114" text-anchor="middle" fill="#8b949e" font-size="11">Ground-truth tree inventory</text>

  <!-- Arrow down + split -->
  <line x1="480" y1="127" x2="480" y2="148" stroke="#30363d" stroke-width="1.5"/>
  <line x1="200" y1="148" x2="760" y2="148" stroke="#30363d" stroke-width="1.5"/>
  <line x1="200" y1="148" x2="200" y2="168" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="760" y1="148" x2="760" y2="168" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ONE-STEP box -->
  <rect x="50" y="168" width="300" height="62" rx="8" fill="#161b22" stroke="#f78166" stroke-width="1.5"/>
  <text x="200" y="192" text-anchor="middle" fill="#f78166" font-size="12" font-weight="700">ONE-STEP APPROACH</text>
  <text x="200" y="210" text-anchor="middle" fill="#8b949e" font-size="11">YOLOv11s Object Detection</text>
  <text x="200" y="225" text-anchor="middle" fill="#8b949e" font-size="10">RGB · IRRG</text>

  <!-- TWO-STEP box — no RGB/IRRG here -->
  <rect x="610" y="168" width="300" height="62" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="760" y="196" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">TWO-STEP APPROACH</text>
  <text x="760" y="218" text-anchor="middle" fill="#8b949e" font-size="11">Crown Delineation + Classification</text>

  <!-- Arrow one-step down -->
  <line x1="200" y1="230" x2="200" y2="268" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow two-step down to sub-boxes -->
  <line x1="760" y1="230" x2="760" y2="255" stroke="#30363d" stroke-width="1.5"/>
  <line x1="648" y1="255" x2="872" y2="255" stroke="#30363d" stroke-width="1.5"/>
  <line x1="648" y1="255" x2="648" y2="268" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="872" y1="255" x2="872" y2="268" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Bounding box predictions -->
  <rect x="50" y="268" width="300" height="52" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="200" y="291" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Bounding box predictions</text>
  <text x="200" y="308" text-anchor="middle" fill="#8b949e" font-size="10">Class label + confidence score per crown</text>

  <!-- Crown Delineation — with RGB/IRRG note on YOLOv11s-seg line -->
  <rect x="573" y="268" width="160" height="68" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="653" y="289" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Crown Delineation</text>
  <text x="653" y="306" text-anchor="middle" fill="#8b949e" font-size="10">PyCrown (LiDAR)</text>
  <text x="653" y="321" text-anchor="middle" fill="#8b949e" font-size="10">YOLOv11s-seg</text>
  <text x="653" y="333" text-anchor="middle" fill="#8b949e" font-size="9">(RGB · IRRG)</text>

  <!-- Feature Extraction -->
  <rect x="753" y="268" width="160" height="68" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="833" y="289" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Feature Extraction</text>
  <text x="833" y="306" text-anchor="middle" fill="#8b949e" font-size="10">RGB · NIR · NDVI</text>
  <text x="833" y="321" text-anchor="middle" fill="#8b949e" font-size="10">CHM · Crown area</text>

  <!-- Arrow between delineation and features -->
  <line x1="733" y1="302" x2="751" y2="302" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrows from sub-boxes down to RF -->
  <line x1="653" y1="336" x2="653" y2="362" stroke="#30363d" stroke-width="1.5"/>
  <line x1="833" y1="336" x2="833" y2="362" stroke="#30363d" stroke-width="1.5"/>
  <line x1="653" y1="362" x2="833" y2="362" stroke="#30363d" stroke-width="1.5"/>
  <line x1="743" y1="362" x2="743" y2="378" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Random Forest -->
  <rect x="593" y="378" width="300" height="66" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="743" y="400" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="700">Random Forest Classification</text>
  <text x="743" y="418" text-anchor="middle" fill="#8b949e" font-size="10">Binary: allergenic vs non-allergenic</text>
  <text x="743" y="433" text-anchor="middle" fill="#8b949e" font-size="10">Multi-class: 5 species (FC1 · FC2)</text>

  <!-- Arrows converging to output -->
  <line x1="200" y1="320" x2="200" y2="472" stroke="#30363d" stroke-width="1.5"/>
  <line x1="743" y1="444" x2="743" y2="472" stroke="#30363d" stroke-width="1.5"/>
  <line x1="200" y1="472" x2="743" y2="472" stroke="#30363d" stroke-width="1.5"/>
  <line x1="480" y1="472" x2="480" y2="486" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output box -->
  <rect x="190" y="486" width="580" height="46" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="480" y="507" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">Species Predictions + Urban Morphology Analysis</text>
  <text x="480" y="523" text-anchor="middle" fill="#8b949e" font-size="10">Campus validation · LCZ analysis</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#30363d"/>
    </marker>
  </defs>

</svg>
